<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@200;300;400;500;600;700&display=swap');
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0c0b09; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  /* Subtle glow */
  .glow {
    position: absolute; top: 50%; right: 20%; width: 400px; height: 400px;
    transform: translateY(-50%);
    background: radial-gradient(circle, rgba(196,122,74,.08) 0%, transparent 70%);
    filter: blur(80px); pointer-events: none;
  }
  .content {
    position: relative; z-index: 2; text-align: left; padding: 0 120px;
    width: 100%;
  }
  .logo {
    font-family: 'Space Mono', monospace; font-size: 48px; font-weight: 700;
    letter-spacing: 8px; text-transform: uppercase; color: #c8c0b4;
    margin-bottom: 32px;
  }
  .logo span { color: #c47a4a; }
  .logo em {
    font-style: italic; font-weight: 300; color: #c47a4a;
    font-family: 'Outfit', sans-serif; font-size: 42px; letter-spacing: 2px;
    text-transform: none; margin-left: -4px;
  }
  .tagline {
    font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 300;
    color: #6b6459; line-height: 1.5; max-width: 600px;
  }
  .line {
    width: 60px; height: 2px; background: #c47a4a; margin-bottom: 24px;
    border-radius: 1px;
  }
  .url {
    position: absolute; bottom: 48px; left: 120px;
    font-family: 'Space Mono', monospace; font-size: 14px;
    letter-spacing: 2px; color: rgba(196,122,74,.4);
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="logo">FLINT<span>.</span><em>digital</em></div>
    <div class="line"></div>
    <div class="tagline">An AI-first digital agency,<br>focused on small business,<br>based in Kansas City.</div>
  </div>
  <div class="url">flintdigital.ai</div>
</body>
</html>
